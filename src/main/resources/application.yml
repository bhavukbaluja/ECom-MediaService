server:
  port: 8087
  netty:
    # ✅ Matches Gateway to ensure long-running video streams don't time out
    connection-timeout: 600s
    idle-timeout: 600s

spring:
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
    allow-circular-references: true

  application:
    name: MediaService

  # ✅ WebFlux Multipart Settings (Critical for 500MB)
  webflux:
    multipart:
      max-file-size: 505MB
      max-disk-usage-per-part: 505MB
      # 0 threshold ensures bytes stream directly to disk, avoiding RAM spikes
      file-size-threshold: 0
      location: /Users/bhavukbaluja/Coding/E-Com-Website/Shared/temp/

  # ✅ Codec limit must be higher than the largest expected file
  codec:
    max-in-memory-size: 512MB

  jpa:
    hibernate:
      ddl-auto: update # ✅ Changed from 'create' to 'update' to avoid losing data on restart
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # ✅ If you have standard servlet dependencies, override these too
  servlet:
    multipart:
      enabled: false

# ========== CUSTOM CONFIGS ==========
